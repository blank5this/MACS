# Prometheus configuration for MACS monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # MACS API metrics
  - job_name: 'macs-api'
    static_configs:
      - targets: ['macs:8000']
    metrics_path: '/metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Redis metrics (if redis-exporter is enabled)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
