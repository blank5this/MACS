# MACS Docker Compose Configuration
version: '3.8'

services:
  # Development environment
  dev:
    build:
      context: .
      target: development
    container_name: macs-dev
    environment:
      - PYTHONUNBUFFERED=1
      - MACS_LOG_LEVEL=DEBUG
      # Add your API keys here or use .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - HUNYUAN_API_KEY=${HUNYUAN_API_KEY:-}
    volumes:
      - ./macs_pkg:/app/macs_pkg:rw
      - ./examples:/app/examples:rw
    stdin_open: true
    tty: true
    command: /bin/bash

  # Production service example
  macs-api:
    build:
      context: .
      target: production
    container_name: macs-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MACS_LOG_LEVEL=INFO
      - MODEL=${DEFAULT_MODEL:-gpt-4}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from macs_pkg.llm import MiniMaxProvider; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Test runner
  test:
    build:
      context: .
      target: development
    container_name: macs-test
    environment:
      - PYTHONUNBUFFERED=1
      - MACS_LOG_LEVEL=DEBUG
    volumes:
      - ./macs_pkg:/app/macs_pkg:ro
      - ./tests:/app/tests:ro
    command: pytest tests/ -v --tb=short
    profiles:
      - test  # Only run with: docker-compose --profile test up
